<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow p-4" style="width: 400px;">
    <h3 class="text-center mb-3">Task Manager</h3>
    <p class="text-center text-muted">Login to manage your tasks</p>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <input class="form-control mb-3" placeholder="Username" [(ngModel)]="username">
    <input class="form-control mb-3" placeholder="Password" type="password" [(ngModel)]="password">

    <button class="btn btn-primary w-100 mb-3" (click)="login()">Login</button>

    <p class="text-center">
      Don’t have an account?
      <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
